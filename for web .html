<!DOCTYPE html>  <html>  
<head>  
<meta name="viewport" content="width=device-width, initial-scale=1">  
<title>ESP32 Hand LED Control</title>  <style>  
  
body{  
background:black;  
color:white;  
text-align:center;  
font-family:sans-serif;  
margin:0;  
transition:0.4s;  
}  
  
body.light{  
background:radial-gradient(circle,#fff176,#000000);  
color:black;  
}  
  
video{  
width:100%;  
transform:scaleX(-1);  
border-bottom:2px solid #333;  
}  
  
#led{  
width:140px;  
height:140px;  
border-radius:50%;  
background:#111;  
margin:25px auto;  
transition:0.3s;  
box-shadow:inset 0 0 10px #000;  
}  
  
#led.on{  
background:#00ff00;  
box-shadow:  
0 0 10px #00ff00,  
0 0 30px #00ff00,  
0 0 70px #00ff00,  
0 0 120px #00ff00,  
inset 0 0 20px #00ff00;  
}  
  
button{  
font-size:22px;  
padding:12px 35px;  
border:none;  
border-radius:8px;  
background:#00ff88;  
color:black;  
font-weight:bold;  
margin-top:15px;  
}  
  
#status{  
font-size:22px;  
margin-top:10px;  
}  
  
</style>  </head>  <body>  <h2>ESP32 Hand LED Control</h2>  <button onclick="startCamera()">START CAMERA</button>

<br><br>

<video id="video" autoplay playsinline></video>

<div id="led"></div>  <h3 id="status">LED OFF</h3>  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>  <script>  
  
const video=document.getElementById("video");  
const led=document.getElementById("led");  
const status=document.getElementById("status");  
  
let ledState=false;  
let lastChange=0;  
  
function sendOn(){  
fetch("http://192.168.4.1/on");  
}  
  
function sendOff(){  
fetch("http://192.168.4.1/off");  
}  
  
function ledOn(){  
  
if(ledState) return;  
  
ledState=true;  
  
led.classList.add("on");  
document.body.classList.add("light");  
  
status.innerText="LED ON";  
  
sendOn();  
  
}  
  
function ledOff(){  
  
if(!ledState) return;  
  
ledState=false;  
  
led.classList.remove("on");  
document.body.classList.remove("light");  
  
status.innerText="LED OFF";  
  
sendOff();  
  
}  
  
function safeOn(){  
if(Date.now()-lastChange>800){  
ledOn();  
lastChange=Date.now();  
}  
}  
  
function safeOff(){  
if(Date.now()-lastChange>800){  
ledOff();  
lastChange=Date.now();  
}  
}  
  
const hands=new Hands({  
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`  
});  
  
hands.setOptions({  
maxNumHands:1,  
modelComplexity:0,  
minDetectionConfidence:0.6,  
minTrackingConfidence:0.6  
});  
  
hands.onResults(results=>{  
  
if(results.multiHandLandmarks.length){  
  
const lm=results.multiHandLandmarks[0];  
  
let open=0;  
  
if(lm[8].y < lm[6].y) open++;  
if(lm[12].y < lm[10].y) open++;  
if(lm[16].y < lm[14].y) open++;  
if(lm[20].y < lm[18].y) open++;  
  
if(open>=3){  
safeOn();  
}  
  
if(open<=1){  
safeOff();  
}  
  
}  
  
});  
  
function startCamera(){  
  
navigator.mediaDevices.getUserMedia({video:true})  
.then(stream=>{  
  
video.srcObject=stream;  
  
const camera=new Camera(video,{  
onFrame:async()=>{  
await hands.send({image:video});  
},  
width:640,  
height:480  
});  
  
camera.start();  
  
});  
  
}  
  
</script>  </body>  
</html>
